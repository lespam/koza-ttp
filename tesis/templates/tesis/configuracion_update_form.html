<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crear configuracion</title>
</head>
<body>
    <h2>Crear Configuracion</h2>
    {% if messages %}
    <ul class="messages">
      {% for message in messages %}
        {% if message.tags %}
          <li class="{{ message.tags }}">{{ message }}</li>
        {% endif %}
      {% endfor %}
    </ul>
  {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="Crear">
    </form>
    <a href="{% url 'tesis:configuracion_list' %}">Cancelar</a>
    <h2>Menu</h2>
    <ul>
        <li><a href="{%url 'tesis:liga_list' %}">Liga</a></li>
        <li><a href="{%url 'tesis:equipo_list' %}">Team</a></li>
        <li><a href="{%url 'tesis:torneo_list' %}">Torneo</a></li>
        <li><a href="{%url 'tesis:calendario_list' %}">Calendario</a></li>
        <li><a href="{%url 'tesis:juego_list' %}">Juego</a></li>
        <li><a href="{%url 'tesis:configuracion_list' %}">Configuracion</a></li>
    </ul>
</body>
</html>
