<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>equipo</title>
</head>
<body>
    <h1>Eliminar equipo</h1>
    
    {% if messages %}
    <ul class="messages">
      {% for message in messages %}
        {% if message.tags %}
          <li class="{{ message.tags }}">{{ message }}</li>
        {% endif %}
      {% endfor %}
    </ul>
    {% endif %}

    <h2>Formulario de eliminacion</h2>
    <form method="post">{% csrf_token %}
        <h2>Elimminar equipo</h2>
        <p>¿Está seguro de eliminar "{{ object }}"?</p>
        {{ form.as_p }}
        <input type="submit" value="Confirmar">

        <a href="{% url 'myapp:equipo_list' %}">Cancelar</a>
    </form>

</body>
</html>
