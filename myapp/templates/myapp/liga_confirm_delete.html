<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
</head>
<body>
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>
                    {{ message }}
                </li>
            {% endfor %}
        </ul>
    {% endif %}
    <form method="post">{% csrf_token %}
        <h2>Elimminar Liga</h2>
        <p>¿Está seguro de eliminar "{{ object.nickname }}"?</p>
        {{ form }}
        <input type="submit" value="Confirmar">
        <a href="{% url 'myapp:liga_list' %}">Cancelar</a>
    </form>
    
</body>
</html>
